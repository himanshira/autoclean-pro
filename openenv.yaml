# openenv.yaml
version: "1.0.0"
name: "AutoClean-Pro"
description: "Data cleaning and governance environment for RL agents."
tasks:
  - id: "easy"
  - id: "medium"
  - id: "hard"
action_space:
  type: "discrete"
  tools: ["fillna", "drop_rows", "cast_type", "knn_impute", "mode_impute", "flag_human", "finish"]
observation_space:
  type: "json"
  fields: ["data_preview", "missing_report", "schema_info", "message"]