spec_version: 1
name: autoclean-pro
version: "1.0.0"
description: "Hardware-aware data cleaning RL environment with HITL governance"
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: easy
    description: "Impute missing values in a 10-row numeric dataset using knn and median imputation"
    difficulty: easy
    grader: grade/easy

  - id: medium
    description: "Repair schema (cast_type) then impute mixed-type dataset with knn and mode imputation"
    difficulty: medium
    grader: grade/medium

  - id: hard
    description: "Governance task — flag Survey_Response (40% missing) then impute Income_k"
    difficulty: hard
    grader: grade/hard

endpoints:
  reset:
    method: POST
    path: /reset
    query_params:
      task_id:
        type: string
        enum: [easy, medium, hard]
        default: easy
    response:
      observation:
        type: object
      info:
        type: object

  step:
    method: POST
    path: /step
    query_params:
      task_id:
        type: string
        enum: [easy, medium, hard]
        default: easy
    body:
      tool:
        type: string
        enum: [knn_impute, multifeature_knn_impute, median_impute, mode_impute, flag_human, fillna, cast_type, finish]
      column:
        type: string
        nullable: true
      params:
        type: object
        default: {}
    response:
      observation:
        type: object
      reward:
        type: number
      done:
        type: boolean
      info:
        type: object

  grader:
    method: GET
    path: /grader
    query_params:
      task_id:
        type: string
        enum: [easy, medium, hard]
        default: easy
    response:
      task_id:
        type: string
      score:
        type: number
        minimum: 0.001
        maximum: 0.999
      success:
        type: boolean

action_space:
  type: discrete
  actions:
    knn_impute:
      description: Single-column KNN imputation. Numeric columns, scarce datasets (n<=50).
      params:
        n_neighbors:
          type: integer
          default: 5
    multifeature_knn_impute:
      description: Multi-feature KNN imputation. Uses all numeric columns. Large datasets (n>50).
      params:
        n_neighbors:
          type: integer
          default: 5
    median_impute:
      description: Fill NaNs with column median. Numeric columns, score < 0.15.
      params: {}
    mode_impute:
      description: Fill NaNs with column mode. Categorical/object columns.
      params: {}
    cast_type:
      description: Cast column dtype from object to numeric.
      params:
        target_dtype:
          type: string
          default: float64
    flag_human:
      description: Flag column for human review. Required when weighted missingness >= 0.35.
      params: {}
    fillna:
      description: Fill NaNs with a literal value.
      params:
        value:
          type: any
          default: 0
    finish:
      description: Submit the cleaned dataset for final grading.
      params: {}

observation_space:
  type: json
  fields:
    data_preview:
      type: array
      description: First 5 rows of the current dataframe.
    missing_report:
      type: object
      description: Bayesian-weighted missingness score per column (0.0=clean).
    schema_info:
      type: object
      description: Current dtype per column.
    total_rows:
      type: integer
    message:
      type: string
    weighting_mode:
      type: string
      description: "bayesian_scarce or standard_uniform"
    dataset_regime:
      type: string
      description: "e.g. scarce_10rows or standard_322rows"
    available_tools:
      type: array
      description: Live tool registry snapshot.

reward:
  formula: "DeltaQuality + StrategyBonus + AccuracyBonus + RarityBonus - Penalties"
  components:
    cleaning_gain:
      range: [-1.0, 2.0]
    governance:
      flag_human_correct: 2.0
      impute_on_high_miss: -5.0
    rarity_bonus:
      diverse_tool: 0.1
      back_to_back_repeat: -2.0
    accuracy_bonus:
      exact_match: 1.0

constraints:
  max_steps_per_episode: 15
  hardware_target:
    vcpu: 2
    ram_gb: 8
  server_port: 7860